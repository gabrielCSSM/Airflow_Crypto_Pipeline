services:
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 10
    networks:
      - airflow-net

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.Airflow
    container_name: airflow-init
    command: db migrate
    environment: &airflow-env
      AIRFLOW__API_SERVER__URL: http://airflow-api-server:8080
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      
      AIRFLOW__LOGGING__REMOTE_LOGGING: "False"
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
      
      AIRFLOW__CORE__HOSTNAME_CALLABLE: socket.getfqdn
    volumes:
      - ./dags:/opt/airflow/dags
      - ./dags/data:/opt/airflow/data
      - ./logs/opt/airflow/logs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - airflow-net

  airflow-api-server:
    build:
      context: .
      dockerfile: Dockerfile.Airflow
    container_name: airflow-api-server
    hostname: airflow-api-server
    command: api-server
    ports:
      - "8080:8080"
    environment: *airflow-env
    volumes:
      - ./dags:/opt/airflow/dags
      - ./dags/data:/opt/airflow/data
      - ./logs/opt/airflow/logs
    networks:
      - airflow-net
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.Airflow
    container_name: airflow-scheduler
    hostname: airflow-scheduler
    command: scheduler
    environment: *airflow-env
    volumes:
      - ./dags:/opt/airflow/dags
      - ./dags/data:/opt/airflow/data
      - ./logs/opt/airflow/logs
    networks:
      - airflow-net
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    build:
      context: .
      dockerfile: Dockerfile.Airflow
    container_name: airflow-dag-processor
    hostname: airflow-dag-processor
    command: dag-processor
    environment: *airflow-env
    volumes:
      - ./dags:/opt/airflow/dags
      - ./dags/data:/opt/airflow/data
      - ./logs/opt/airflow/logs
    networks:
      - airflow-net
    depends_on:
      airflow-init:
        condition: service_completed_successfully
  spark:
    build:
      context: .
      dockerfile: Dockerfile.Spark
    container_name: spark
    volumes:
      - ./dags/data:/app/data
    ports:
      - "4040:4040"
    environment:
      - PYTHONPATH=/app
    networks:
      - airflow-net
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.Spark
    container_name: streamlit
    volumes:
      - ./dags/app:/app
      - ./dags/data:/data
    ports:
      - "8501:8501"
    command: streamlit run dashboard.py --server.address=0.0.0.0
    networks:
      - airflow-net

networks:
  airflow-net:
    driver: bridge